<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0f172a" />
  <title>DAPE | AI Form Pipeline</title>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">D</div>
        <h1>DAPE</h1>
      </div>
      <nav>
        <ul class="nav-links">
          <li>
            <a href="{{ url_for('web.index') }}" class="{{ 'active' if request.endpoint == 'web.index' }}">
              <i class="ph ph-squares-four"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li>
            <a href="{{ url_for('web.configs_page') }}" class="{{ 'active' if 'config' in request.endpoint }}">
              <i class="ph ph-gear"></i>
              <span>Configurations</span>
            </a>
          </li>
          <li>
            <a href="{{ url_for('web.jobs') }}" class="{{ 'active' if request.endpoint == 'web.jobs' }}">
              <i class="ph ph-list-bullets"></i>
              <span>Job Queue</span>
            </a>
          </li>
          <li style="margin-top: auto">
            <a href="#" class="ghost">
              <i class="ph ph-question"></i>
              <span>Help Center</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
