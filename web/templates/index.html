{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Upload form</h2>
  <form method="post" action="{{ url_for('web.upload') }}" enctype="multipart/form-data">
    <label>Config
      <select name="config_name" required>
        <option value="">Select config</option>
        {% for c in configs %}
          <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
      </select>
    </label>
    <label>Form file (TIFF/PNG/JPG)
      <input type="file" name="form_file" accept=".tif,.tiff,.png,.jpg,.jpeg" required />
    </label>
    <button type="submit">Process</button>
  </form>
</section>

<section class="card">
  <h2>Recent jobs</h2>
  <table>
    <thead><tr><th>Job ID</th><th>Status</th><th>Config</th><th>Action</th></tr></thead>
    <tbody>
      {% for j in jobs %}
      <tr>
        <td>{{ j.job_id }}</td>
        <td>{{ j.status }}</td>
        <td>{{ j.config_name }}</td>
        <td><a href="{{ url_for('web.job_detail', id=j.job_id) }}">Open</a></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
