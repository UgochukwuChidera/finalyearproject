{% extends "base.html" %}
{% block content %}
<section class="grid-2">
  <div class="card">
    <h2>{{ 'New Config' if mode == 'new' else 'Edit Config: ' ~ config_name }}</h2>
    <form method="post">
      {% if mode == 'new' %}
      <label>Config name
        <input name="config_name" value="{{ config_name }}" required />
      </label>
      {% else %}
      <input type="hidden" name="config_name" value="{{ config_name }}" />
      {% endif %}
      <textarea id="config-json" name="config_json" rows="24">{{ config_text }}</textarea>
      <button type="submit">Save</button>
    </form>
  </div>

  <div class="card">
    <h2>Bounding-box editor</h2>
    <p class="muted">Drag to move, drag bottom-right handle to resize. Save writes updated JSON in editor.</p>
    <canvas id="bbox-canvas" width="900" height="600"
            data-template="{{ template_path }}"
            data-fields='{{ (config.fields if config else []) | tojson }}'></canvas>
    <div class="row">
      <button type="button" onclick="vfLoadFromJson()">Load from JSON</button>
      <button type="button" onclick="vfApplyBoxesToJson()">Apply boxes to JSON</button>
    </div>
    <pre id="bbox-output" class="muted"></pre>
  </div>
</section>
{% endblock %}
